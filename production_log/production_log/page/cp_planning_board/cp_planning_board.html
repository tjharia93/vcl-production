<div class="cp-planning-board-container">

  <!-- Toolbar -->
  <div class="cp-board-toolbar">
    <div class="board-week-nav">
      <button class="btn btn-sm btn-default" id="cp-prev-week">
        <span class="fa fa-chevron-left"></span>
      </button>
      <span class="cp-week-label" id="cp-week-label">Loading...</span>
      <button class="btn btn-sm btn-default" id="cp-next-week">
        <span class="fa fa-chevron-right"></span>
      </button>
      <button class="btn btn-sm btn-default" id="cp-today-btn" style="margin-left:8px">Today</button>
    </div>
    <div class="board-status-legend">
      <span class="legend-dot legend-pending"></span> Pending &nbsp;
      <span class="legend-dot legend-inprogress"></span> In Progress &nbsp;
      <span class="legend-dot legend-done"></span> Done
    </div>
    <div class="board-actions">
      <button class="btn btn-sm btn-primary" id="cp-refresh-btn">
        <span class="fa fa-refresh"></span> Refresh
      </button>
    </div>
  </div>

  <!-- Main body: pool + grid -->
  <div class="cp-board-body">

    <!-- Job Pool Panel -->
    <div class="cp-job-pool" id="cp-job-pool">
      <div class="pool-header">
        <strong>Job Pool</strong>
        <span class="badge badge-secondary" id="cp-pool-count">0</span>
      </div>
      <div class="pool-search-wrap">
        <input type="text" class="form-control form-control-sm"
               id="cp-pool-search" placeholder="Filter by customer / job no..." />
      </div>
      <div class="pool-hint text-muted small">Click a job to select, then click a machine cell to assign.</div>
      <div class="pool-list" id="cp-pool-list">
        <div class="pool-loading text-center text-muted" style="padding:20px">
          <span class="fa fa-spinner fa-spin"></span> Loading...
        </div>
      </div>
    </div>

    <!-- Planning Grid -->
    <div class="cp-grid-wrap" id="cp-grid-wrap">
      <div class="cp-grid-loading text-center text-muted" style="padding:40px" id="cp-grid-loading">
        <span class="fa fa-spinner fa-spin"></span> Loading schedule...
      </div>
      <table class="cp-planning-grid table table-bordered" id="cp-planning-grid" style="display:none">
        <thead id="cp-grid-head"></thead>
        <tbody id="cp-grid-body"></tbody>
      </table>
    </div>

  </div>
</div>
